name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (typecheck)
        run: npm run lint

      - name: Build
        run: npm run build

  # Runs ON the Dell (self-hosted runner). No public SSH / DuckDNS needed.
  # One-time: install runner on Dell, set repo variable APP_DIR.
  deploy:
    name: Deploy worker on Dell
    needs: lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Pull, build, reload PM2
        env:
          APP_DIR: ${{ vars.APP_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${APP_DIR:-}" ]; then
            echo "Set repository variable APP_DIR (e.g. /home/chaitu/apps/jobpilot-apply-worker)"
            exit 1
          fi
          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull origin main
          npm ci
          npx playwright install chromium
          npm run build
          pm2 reload ecosystem.config.cjs --update-env \
            || pm2 start ecosystem.config.cjs
          pm2 save
